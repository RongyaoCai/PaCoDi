model:
  target: models.pacodi.pacodi_ddpm.PaCoDi_ddpm
  params:
    seq_length: 24
    channels: 1
    max_step: 500
    sampling_steps: 500
    ddim_eta: 0.0
    frequency_keep_ratio: 1.0
    beta_schedule: 'cosine'
    backbone: dit_solver_v1
    real_imag_interaction: true
    instance_norm: true
    emb_size: 128
    patch_size: 1
    num_layers: 4

solver:
  base_lr: 5.0e-5
  train_steps: 10000
  results_folder: ./checkpoints_air
  gradient_accumulate_every: 2
  checkpoint_count: 5
  save_cycle: 2000  # train_steps // checkpoint_count
  ema:
    decay: 0.995
    update_interval: 10

  scheduler:
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
    params:
      factor: 0.5
      patience: 3000
      min_lr: 1.0e-6
      threshold: 1.0e-2
      threshold_mode: rel
      warmup_lr: 2.0e-4
      warmup: 500
      verbose: False

dataloader:
  train_dataset:
    target: data.dataset_utils.conditional_dataset.ConditionalDataset
    params:
      name: embedding_cleaned_airquality_24
      data_root: ./data/TSFragment-600K
      window: 24
      seed: 123
      split_ratio: 0.9
      period: train

  test_dataset:
    target: data.dataset_utils.conditional_dataset.ConditionalDataset
    params:
      name: embedding_cleaned_airquality_24
      split_ratio: 0.9
      data_root: ./data/TSFragment-600K
      window: 24
      seed: 123
      period: test
    coefficient: 1.0e-2
    step_size: 5.0e-2
    sampling_steps: 200

  batch_size: 128
  sample_size: 256
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  shuffle: True
