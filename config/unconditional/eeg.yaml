model:
  target: models.pacodi.pacodi_sde.PaCoDi_sde
  params:
    seq_length: 256
    channels: 14
    max_step: 500
    sampling_steps: 500
    ddim_eta: 0.0
    frequency_keep_ratio: 1.0
    beta_schedule: 'cosine'
    backbone: dit_solver_v1
    real_imag_interaction: true
    instance_norm: true
    emb_size: 256
    patch_size: 1
    num_layers: 4

solver:
  base_lr: 1.0e-5
  train_steps: 12000
  results_folder: ./checkpoints_eeg
  gradient_accumulate_every: 2
  checkpoint_count: 5
  save_cycle: 2400  # train_steps // checkpoint_count
  ema:
    decay: 0.995
    update_interval: 10

  scheduler:
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
    params:
      factor: 0.5
      patience: 3000
      min_lr: 1.0e-5
      threshold: 1.0e-1
      threshold_mode: rel
      warmup_lr: 8.0e-4
      warmup: 500
      verbose: False

dataloader:
  train_dataset:
    target: data.dataset_utils.time_series_dataset.TimeSeriesDataset
    params:
      data_root: ./data/datasets/eeg.npy
      window: 256  # seq_length
      channels: 14
      stride: 1
      split_ratio: 0.9
      normalize: true
      save2npy: True
      neg_one_to_one: True
      period: train

  test_dataset:
    target: data.dataset_utils.time_series_dataset.TimeSeriesDataset
    params:
      data_root: ./data/datasets/eeg.npy
      window: 256  # seq_length
      channels: 14
      stride: 1
      split_ratio: 0.9
      normalize: true
      save2npy: True
      neg_one_to_one: True
      period: test
    coefficient: 1.0e-2
    step_size: 5.0e-2
    sampling_steps: 200

  batch_size: 64
  sample_size: 128
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  shuffle: True
