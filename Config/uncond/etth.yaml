model:
  target: Models.PaCoDi.diffusion_sde.PaCoDi_sde
  params:
    seq_length: 24
    feature_size: 7       # ETTh1/ETTh2 数据集标准特征数（含目标 OT）
    timesteps: 1000
    sampling_timesteps: 1000
    beta_schedule: 'cosine'
    emb_size: 128
    patch_size: 1
    num_layers: 4         # Transformer 层数

solver:
  base_lr: 1.0e-5
  max_epochs: 20000
  results_folder: ./Checkpoints_etth
  gradient_accumulate_every: 2
  save_cycle: 2000  # max_epochs // 10
  ema:
    decay: 0.995
    update_interval: 10

  scheduler:
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
    params:
      factor: 0.5
      patience: 4000
      min_lr: 1.0e-5
      threshold: 1.0e-1
      threshold_mode: rel
      warmup_lr: 8.0e-4
      warmup: 500
      verbose: False

dataloader:
  train_dataset:
    target: Utils.Data_utils.real_datasets.CustomDataset
    params:
      name: etth
      proportion: 1.0  # Set to rate < 1 if training conditional generation
      data_root: ./Data/datasets/ETTh.csv
      window: 24  # seq_length
      save2npy: True
      neg_one_to_one: True
      seed: 123
      period: train

  test_dataset:
    target: Utils.Data_utils.real_datasets.CustomDataset
    params:
      name: etth
      proportion: 0.9  # rate
      data_root: ./Data/datasets/ETTh.csv
      window: 24  # seq_length
      save2npy: True
      neg_one_to_one: True
      seed: 123
      period: test
      style: separate
      distribution: geometric
    coefficient: 1.0e-2
    step_size: 5.0e-2
    sampling_steps: 200

  batch_size: 128
  sample_size: 256
  shuffle: True