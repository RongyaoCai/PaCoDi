model:
  target: Models.PaCoDi.diffusion_ddpm.PaCoDi_ddpm
  params:
    seq_length: 24
    feature_size: 5
    timesteps: 1000
    sampling_timesteps: 1000
    beta_schedule: 'cosine'
    emb_size: 128
    patch_size: 4
    num_layers: 4


solver:
  base_lr: 1.0e-5
  max_epochs: 12000
  results_folder: ./Checkpoints_sine
  gradient_accumulate_every: 2
  save_cycle: 1200
  ema:
    decay: 0.995
    update_interval: 10
  
  scheduler:
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
    params:
      factor: 0.5
      patience: 3000
      min_lr: 1.0e-5
      threshold: 1.0e-1
      threshold_mode: rel
      warmup_lr: 8.0e-4
      warmup: 500 
      verbose: False

dataloader:
  train_dataset:
    target: Utils.Data_utils.sine_dataset.SineDataset
    params:
      num: 10000
      dim: 5
      window: 24  # seq_length
      save2npy: True
      neg_one_to_one: True
      seed: 123
      period: train

  test_dataset:
    target: Utils.Data_utils.sine_dataset.SineDataset
    params:
      num: 1000
      dim: 5
      window: 24  # seq_length
      save2npy: True
      neg_one_to_one: True
      seed: 123
      style: separate
      period: test
      distribution: geometric
    coefficient: 1.0e-2
    step_size: 5.0e-2
    sampling_steps: 200

  batch_size: 128
  sample_size: 256
  shuffle: True